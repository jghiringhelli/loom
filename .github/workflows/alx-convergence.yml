name: ALX Convergence

on:
  workflow_dispatch:
    inputs:
      target_s:
        description: "Target S_realized threshold (0.0 - 1.0)"
        default: "0.90"
        required: true

permissions:
  contents: read

jobs:
  measure:
    name: Measure S_realized
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build derived compiler
        working-directory: experiments/alx/derived
        run: cargo build 2>&1 || true

      - name: Run ALX test suite
        working-directory: experiments/alx/derived
        run: cargo test --no-fail-fast 2>&1 | tee test-output.txt
        continue-on-error: true

      - name: Compute S_realized
        run: |
          PASSING=$(grep -oP 'test result: ok\. \K\d+(?= passed)' experiments/alx/derived/test-output.txt | awk '{s+=$1} END{print s}')
          TOTAL=410
          PASSING=${PASSING:-0}
          S=$(echo "scale=4; $PASSING / $TOTAL" | bc)
          echo "## ALX S_realized"
          echo ""
          echo "Passing: $PASSING / $TOTAL = $S"
          echo ""
          TARGET=${{ inputs.target_s }}
          if (( $(echo "$S >= $TARGET" | bc -l) )); then
            echo "Gate PASSED"
          else
            echo "Gate PENDING (target: $TARGET)"
          fi
