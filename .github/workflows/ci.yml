name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Real compiler test suite ─────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cargo test (single-threaded for e2e stability)
        run: cargo test -- --test-threads=1 2>&1 | tee test-output.txt

      - name: Count passing tests
        if: always()
        run: |
          PASSING=$(grep -oP 'test result: ok\. \K\d+(?= passed)' test-output.txt | awk '{s+=$1} END{print s+0}')
          echo "Tests passing: $PASSING"
          echo "### ✅ Tests: $PASSING passing" >> $GITHUB_STEP_SUMMARY

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt
          retention-days: 7

  # ── Website build ─────────────────────────────────────────────────────────────
  website:
    name: Website build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Install deps
        working-directory: website
        run: npm ci

      - name: Build Astro site
        working-directory: website
        run: npm run build

