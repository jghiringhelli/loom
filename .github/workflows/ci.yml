name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Real compiler test suite ─────────────────────────────────────────────────
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cargo test
        id: cargo_test
        run: |
          cargo test --no-fail-fast 2>&1 | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Compute S_realized
        if: always()
        run: |
          PASSING=$(grep -oP 'test result: ok\. \K\d+(?= passed)' test-output.txt | awk '{s+=$1} END{print s}')
          FAILING=$(grep -oP '\d+(?= failed)' test-output.txt | tail -1)
          TOTAL=410
          PASSING=${PASSING:-0}
          FAILING=${FAILING:-0}
          S=$(echo "scale=4; $PASSING / $TOTAL" | bc)
          echo "S_realized = $PASSING / $TOTAL = $S"
          echo "### S_realized = $PASSING / $TOTAL = $S" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if (( $(echo "$S >= 0.90" | bc -l) )); then
            echo "✅ **ALX gate passed** — S ≥ 0.90, ready for publication" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **ALX gate pending** — target S ≥ 0.90" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt
          retention-days: 30

  # ── ALX derived compiler (self-applicability gate) ───────────────────────────
  alx:
    name: ALX S_realized
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            experiments/alx/derived/target/
          key: ${{ runner.os }}-alx-${{ hashFiles('experiments/alx/derived/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-alx-

      - name: Build derived compiler
        working-directory: experiments/alx/derived
        run: cargo build 2>&1

      - name: Run real test suite against derived compiler
        working-directory: experiments/alx/derived
        run: |
          cargo test --no-fail-fast 2>&1 | tee ../evidence/test-output.txt
        continue-on-error: true

      - name: Compute S_realized
        working-directory: experiments/alx
        run: |
          PASSING=$(grep -oP 'test result: ok\. \K\d+(?= passed)' evidence/test-output.txt | awk '{s+=$1} END{print s}')
          TOTAL=410
          PASSING=${PASSING:-0}
          S=$(echo "scale=4; $PASSING / $TOTAL" | bc)
          echo "S_realized = $PASSING / $TOTAL = $S" | tee evidence/s-realized.txt
          echo "### ALX S_realized = $PASSING / $TOTAL = **$S**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests passing | $PASSING |" >> $GITHUB_STEP_SUMMARY
          echo "| Total tests | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| S_realized | $S |" >> $GITHUB_STEP_SUMMARY
          if (( $(echo "$S >= 0.90" | bc -l) )); then
            echo "| Gate | ✅ PASSED |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Gate | ⚠️ PENDING (need ≥ 0.90) |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload ALX evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alx-evidence
          path: experiments/alx/evidence/
          retention-days: 90

  # ── Website build ─────────────────────────────────────────────────────────────
  website:
    name: Website build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Install deps
        working-directory: website
        run: npm ci

      - name: Build Astro site
        working-directory: website
        run: npm run build

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: bioiso-site
          path: website/dist/
          retention-days: 7
