name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Real compiler test suite ─────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cargo test (single-threaded for e2e stability)
        run: cargo test -- --test-threads=1 2>&1 | tee test-output.txt

      - name: Count passing tests
        if: always()
        run: |
          PASSING=$(grep -oP 'test result: ok\. \K\d+(?= passed)' test-output.txt | awk '{s+=$1} END{print s+0}')
          echo "Tests passing: $PASSING"
          echo "### ✅ Tests: $PASSING passing" >> $GITHUB_STEP_SUMMARY

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt
          retention-days: 7

  # ── Kani formal proof harnesses ──────────────────────────────────────────────
  kani:
    name: Kani CBMC proofs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-kani-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-kani-

      - name: Install Kani verifier
        run: cargo install --locked kani-verifier

      - name: Build Loom CLI
        run: cargo build --bin loom --release

      - name: Compile v2_kani_clean.loom → Rust
        run: ./target/release/loom compile experiments/verification/v2_kani_clean.loom

      - name: Create standalone Kani crate
        run: |
          mkdir -p /tmp/kani_verify/src
          cp experiments/verification/v2_kani_clean.rs /tmp/kani_verify/src/lib.rs
          cat > /tmp/kani_verify/Cargo.toml << 'EOF'
          [package]
          name = "kani_verify"
          version = "0.1.0"
          edition = "2021"
          EOF

      - name: Run cargo kani (formal proof)
        working-directory: /tmp/kani_verify
        run: |
          cargo kani 2>&1 | tee kani-output.txt
          echo "### Kani proof results" >> $GITHUB_STEP_SUMMARY
          grep -E "VERIFICATION|FAILED|PASS" kani-output.txt >> $GITHUB_STEP_SUMMARY || true

      - name: Upload Kani output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kani-output
          path: /tmp/kani_verify/kani-output.txt
          retention-days: 7

  # ── LX-4 Stateless Derivability dry runs ─────────────────────────────────────
  lx4-derivability:
    name: LX-4 Stateless Derivability
    runs-on: ubuntu-latest
    # Only run when ANTHROPIC_API_KEY secret is present (i.e. in main repo, not forks)
    if: ${{ github.event_name == 'push' && vars.RUN_LX4 == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Loom CLI
        run: cargo build --bin loom --release

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install anthropic SDK
        run: pip install anthropic

      - name: Run LX-4 cold-start trials
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LOOM_BIN: ./target/release/loom
        run: python experiments/lx/LX-4-stateless-derivability/run_trials.py

      - name: Upload LX-4 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lx4-evidence
          path: experiments/lx/LX-4-stateless-derivability/evidence/
          retention-days: 30

  # ── SMT contract verification via Z3 ─────────────────────────────────────────
  smt-verify:
    name: SMT Z3 contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Z3
        run: sudo apt-get install -y z3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-smt-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-smt-

      - name: Build + test with smt feature
        run: cargo test --features smt -- --test-threads=1 2>&1 | tee smt-output.txt

      - name: Smoke test Z3 invocation
        run: |
          echo "(declare-const x Int)(assert (> x 0))(assert (not (> x 0)))(check-sat)" | z3 -in
          echo "### Z3 smoke test: $(echo '(declare-const x Int)(assert (> x 0))(assert (not (> x 0)))(check-sat)' | z3 -in)" >> $GITHUB_STEP_SUMMARY

      - name: Upload SMT output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smt-output
          path: smt-output.txt
          retention-days: 7

  # ── Compile all BIOISO programs ───────────────────────────────────────────────
  compile-experiments:
    name: Compile BIOISO programs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Loom CLI
        run: cargo build --bin loom --release

      - name: Compile all BIOISO programs
        run: |
          PASS=0; FAIL=0
          for f in experiments/alx/bioiso-*.loom; do
            if ./target/release/loom compile "$f" 2>&1; then
              echo "✅ $f"
              PASS=$((PASS+1))
            else
              echo "❌ $f"
              FAIL=$((FAIL+1))
            fi
          done
          echo "### BIOISO compile: $PASS pass, $FAIL fail" >> $GITHUB_STEP_SUMMARY
          [ $FAIL -eq 0 ]

  # ── Website build ─────────────────────────────────────────────────────────────
  website:
    name: Website build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Install deps
        working-directory: website
        run: npm ci

      - name: Build Astro site
        working-directory: website
        run: npm run build


