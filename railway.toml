# Railway project configuration for the Loom BIOISO colony.
#
# Docs: https://docs.railway.com/reference/config-as-code
#
# Deploy with:
#   railway login
#   railway init
#   railway up
#
# Or link to an existing project:
#   railway link <project-id>
#   railway up

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Start the CEMS evolution daemon with tick interval from the TICK_MS env var.
startCommand = "/bin/sh /usr/local/bin/start-colony.sh"

# Wait up to 120s for the service to write its first log line on cold boot.
# The Rust binary compiles SQLite migrations inline on first start.
healthcheckPath = ""
healthcheckTimeout = 120

# Restart the daemon automatically on crash (e.g. OOM, unexpected panic).
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

# Graceful shutdown: give the daemon 15s to flush the SQLite WAL before SIGKILL.
sleepApplication = false
numReplicas = 1

[[services]]
name = "bioiso-colony"

# ── Volume ────────────────────────────────────────────────────────────────────
# Persist the SQLite signal store across deploys.
# Create the volume in Railway UI → "Add Volume" → mount at /data.
# Then set DB_PATH=/data/bioiso.db in service variables.
[[volumes]]
mountPath = "/data"
name = "bioiso-data"
